version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: wanderlust-mongo
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: wanderlust-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/wanderlust
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: wanderlust-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo-data:
